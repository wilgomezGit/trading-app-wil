
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Gráficos — WilTrader Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand"><img src="assets/logo.png" alt="logo" class="logo"><div class="titles"><h1>Gráficos — WilTrader</h1><div class="subtitle small">Premium</div></div></div>
    <div class="controls"><button class="btn ghost" id="backBtn">⬅ Volver al inicio</button></div>
  </header>

  <main class="container">
    <section class="card metrics-row">
      <div class="metric"><div class="label">Total PnL (USD)</div><div id="mTotal" class="value">$0.00</div></div>
      <div class="metric"><div class="label">Winrate</div><div id="mWin" class="value">0%</div></div>
      <div class="metric"><div class="label">Profit Factor</div><div id="mPF" class="value">—</div></div>
      <div class="metric"><div class="label">Trades</div><div id="mCount" class="value">0</div></div>
    </section>

    <section class="card chart-grid">
      <div class="chart-card"><canvas id="equityChart"></canvas></div>
      <div class="chart-card"><canvas id="distChart"></canvas></div>
    </section>

    <section class="card"><canvas id="barsChart" height="120"></canvas></section>
  </main>

  <footer class="footer">WilTrader Dashboard — Premium</footer>

  <script>
    const firebaseConfig = {"apiKey": "AIzaSyDYGM2kwuG5AhyjzMy_cnH1YEzLbOkBdh4", "authDomain": "wiltraderdashboard.firebaseapp.com", "projectId": "wiltraderdashboard", "storageBucket": "wiltraderdashboard.firebasestorage.app", "messagingSenderId": "665739004897", "appId": "1:665739004897:web:32d97c260294b378f160a0"};
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const VALOR_PUNTO = 50;
    const TRM = 4000;

    async function loadAndRender(){
      const snap = await db.collection('trades').orderBy('timestamp').get();
      const trades = snap.docs.map(d=>d.data());
      const wins = trades.filter(t=>t.resultado!==null && t.resultado>0).length;
      const losses = trades.filter(t=>t.resultado!==null && t.resultado<0).length;
      const be = trades.filter(t=>t.resultado===0).length;
      const totalUSD = trades.reduce((s,t)=> s + (t.resultado===null?0:t.resultado*VALOR_PUNTO*(t.contracts||1)),0);
      const grossW = trades.filter(t=>t.resultado>0).reduce((s,t)=>s + t.resultado*VALOR_PUNTO*(t.contracts||1),0);
      const grossL = Math.abs(trades.filter(t=>t.resultado<0).reduce((s,t)=>s + t.resultado*VALOR_PUNTO*(t.contracts||1),0));
      document.getElementById('mTotal').textContent = '$' + totalUSD.toFixed(2);
      document.getElementById('mWin').textContent = (wins+losses+be)? ((wins/(wins+losses+be))*100).toFixed(1) + '%' : '0%';
      document.getElementById('mPF').textContent = grossL? (grossW/grossL).toFixed(2) : '—';
      document.getElementById('mCount').textContent = trades.length;

      let acc = 0;
      const labels = trades.map((t,i)=> t.fecha || ('T'+(i+1)));
      const equity = trades.map(t=> { acc += (t.resultado===null?0:t.resultado*VALOR_PUNTO*(t.contracts||1)); return acc; });
      const pieData = [wins, losses, be];
      const bars = trades.map(t=> t.resultado===null?0:t.resultado*VALOR_PUNTO*(t.contracts||1));

      const ctxEq = document.getElementById('equityChart').getContext('2d');
      new Chart(ctxEq, { type:'line', data:{ labels, datasets:[{ label:'Equity USD', data: equity, borderColor:'#c9a227', backgroundColor:'rgba(201,162,39,0.08)', fill:true, tension:0.2 }] }, options:{ responsive:true } });

      const ctxPie = document.getElementById('distChart').getContext('2d');
      new Chart(ctxPie, { type:'doughnut', data:{ labels:['Wins','Losses','Break-even'], datasets:[{ data: pieData, backgroundColor:['#16a34a','#ef4444','#f59e0b'] }] }, options:{ responsive:true, plugins:{legend:{position:'bottom'}} } });

      const ctxBars = document.getElementById('barsChart').getContext('2d');
      new Chart(ctxBars, { type:'bar', data:{ labels, datasets:[{ label:'PnL USD', data: bars, backgroundColor: bars.map(v=> v>=0? '#c9a227':'#ef4444') }] }, options:{ responsive:true } });
    }

    document.getElementById('backBtn').addEventListener('click', ()=> location.href='index.html');
    loadAndRender();
  </script>
</body>
</html>
